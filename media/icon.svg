<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#312e81"/>
      <stop offset="0.5" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- subtle inner highlight -->
  <rect x="1" y="1" width="126" height="126" rx="27" fill="none" stroke="#ffffff14" stroke-width="1"/>
  <!-- double chevron (proxy = forward routing), centered on x=64 -->
  <g filter="url(#glow)" stroke="url(#mark)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 36 38 L 64 64 L 36 90"/>
    <path d="M 64 38 L 92 64 L 64 90"/>
  </g>
</svg>
